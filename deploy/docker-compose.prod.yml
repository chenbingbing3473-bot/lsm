# 生产一键部署：MongoDB + API + Nginx 静态前端
# 用法见 deploy/deploy.sh

name: lean-spinmeal

services:
  mongo:
    image: mongo:7
    container_name: lean-spinmeal-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 20s

  api:
    build:
      context: ../server
      dockerfile: Dockerfile
    container_name: lean-spinmeal-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: 3001
      MONGODB_URI: mongodb://mongo:27017/lean_spinmeal
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      QWEN_VL_MODEL: ${QWEN_VL_MODEL:-qwen-vl-plus}
      CORS_ORIGIN: ${PUBLIC_URL}
      PUBLIC_BASE_URL: ${PUBLIC_URL}
      SMS_DEV_MODE: ${SMS_DEV_MODE:-true}
    volumes:
      - api_uploads:/app/uploads
    depends_on:
      mongo:
        condition: service_healthy
    expose:
      - "3001"

  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
      args:
        VITE_API_BASE_URL: /api
    container_name: lean-spinmeal-web
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      - api

  seed:
    build:
      context: ../server
      dockerfile: Dockerfile
    container_name: lean-spinmeal-seed
    env_file:
      - .env
    environment:
      MONGODB_URI: mongodb://mongo:27017/lean_spinmeal
      JWT_SECRET: ${JWT_SECRET}
      PUBLIC_BASE_URL: ${PUBLIC_URL}
    command: node src/scripts/seed.js
    depends_on:
      mongo:
        condition: service_healthy
    profiles:
      - seed

volumes:
  mongo_data:
  api_uploads:
