services:
  mongo:
    image: mongo:7
    container_name: lean-spinmeal-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: lean-spinmeal-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      MONGODB_URI: mongodb://mongo:27017/lean_spinmeal
      JWT_SECRET: ${JWT_SECRET:-docker-dev-jwt-secret}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      CORS_ORIGIN: http://localhost:8080,http://localhost:3000
      PUBLIC_BASE_URL: http://localhost:3001
      SMS_DEV_MODE: "true"
    volumes:
      - ./server/uploads:/app/uploads
    depends_on:
      mongo:
        condition: service_healthy

  seed:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: lean-spinmeal-seed
    environment:
      MONGODB_URI: mongodb://mongo:27017/lean_spinmeal
      JWT_SECRET: ${JWT_SECRET:-docker-dev-jwt-secret}
    command: node src/scripts/seed.js
    depends_on:
      mongo:
        condition: service_healthy
    profiles:
      - seed

volumes:
  mongo_data:
